# Configuración nginx para Laravel Cloud
# Este archivo debe ser configurado en el panel de Laravel Cloud

server {
    listen 80;
    listen [::]:80;
    server_name _;
    
    # IMPORTANTE: Asegúrate de que el root apunte a la carpeta public
    root /var/www/html/public;
    
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    
    index index.php index.html;
    
    charset utf-8;
    
    # Redirigir todas las solicitudes a index.php si el archivo no existe
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Manejar archivos PHP
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;  # Ajusta según tu versión de PHP
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }
    
    # Denegar acceso a archivos ocultos
    location ~ /\.(?!well-known).* {
        deny all;
    }
    
    # Denegar acceso a directorios sensibles
    location ~ ^/(storage|bootstrap/cache|vendor|.env|.git) {
        deny all;
    }
    
    # Cache para archivos estáticos
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|xml|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Optimización de tamaño de respuesta
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
}

