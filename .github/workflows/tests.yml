name: Evaluacion Bebras

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # TRABAJO 1: Análisis de Código (PHPStan)
  analisis-estatico:
    name: Análisis PHPStan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐘 Configurar PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none

      - name: 📦 Instalar Dependencias
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: 🕵️‍♂️ Ejecutar PHPStan (Nivel 9)
        run: ./vendor/bin/phpstan analyse --error-format=github

  # TRABAJO 2: Pruebas de Navegador (Laravel Dusk)
  pruebas-e2e:
    name: Pruebas Dusk (E2E)
    runs-on: ubuntu-latest

    # Este trabajo solo corre si el de PHPStan pasa sin errores
    needs: analisis-estatico

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐘 Configurar PHP 8.4 y SQLite
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite3, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          tools: composer:v2
          coverage: none

      - name: 📦 Instalar Dependencias
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: ⚙️ Configurar Entorno de Prueba (.env)
        run: |
          cp .env.example .env
          php artisan key:generate
          # Le decimos a Laravel que use SQLite
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=database\/database.sqlite/' .env

      - name: 🗄️ Crear Base de Datos Vacía
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: 🌐 Levantar Servidor Local (Background)
        run: php artisan serve --env=testing &
        env:
          APP_ENV: testing
          APP_URL: "http://127.0.0.1:8000"

      - name: 🤖 Instalar Google Chrome (Para el Robot)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 🔄 Actualizar ChromeDriver de Dusk
        run: php artisan dusk:chrome-driver --detect

      - name: 🧪 Ejecutar Pruebas Dusk
        run: php artisan dusk
        env:
          APP_URL: "http://127.0.0.1:8000"
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: 📸 Guardar Capturas de Pantalla (Si falla)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dusk-errores
          path: tests/Browser/screenshots
          retention-days: 3
