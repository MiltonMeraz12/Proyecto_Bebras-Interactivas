name: Evaluacion Bebras

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # TRABAJO 1: Análisis de Código (PHPStan)
  analisis-estatico:
    name: Análisis PHPStan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐘 Configurar PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: 📦 Instalar Dependencias
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: 📂 Preparar directorios de almacenamiento
        run: |
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs

      - name: 🕵️‍♂️ Ejecutar PHPStan (Nivel 5)
        run: ./vendor/bin/phpstan analyse --error-format=github

  # TRABAJO 2: Pruebas de Navegador (Laravel Dusk)
  pruebas-e2e:
    name: Pruebas Dusk (E2E)
    runs-on: ubuntu-latest
    needs: analisis-estatico
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐘 Configurar PHP 8.4 y SQLite
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite3, pdo_sqlite, gd
          tools: composer:v2

      - name: 📦 Instalar Dependencias
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: 📦 Instalar dependencias de Node
        run: npm install

      - name: 🎨 Compilar Assets (Vite)
        run: npm run build

      - name: 📂 Preparar directorios de almacenamiento
        run: |
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs
          chmod -R 777 storage bootstrap/cache

      - name: 📂 Preparar directorios de almacenamiento
        run: |
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs

      - name: ⚙️ Configurar Entorno de Prueba (.env)
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=database\/database.sqlite/' .env

      - name: 🗄️ Crear Base de Datos Vacía
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: 🌐 Levantar Servidor Local (Background)
        run: |
          php artisan serve --env=testing &
          sleep 5
        env:
          APP_ENV: testing
          APP_URL: "http://127.0.0.1:8000"

      - name: 🤖 Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 🔄 Actualizar ChromeDriver
        run: php artisan dusk:chrome-driver --detect

      - name: 🧪 Ejecutar Pruebas Dusk
        run: php artisan dusk
        env:
          APP_URL: "http://127.0.0.1:8000"
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: 📸 Guardar Capturas de Pantalla (Si falla)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dusk-errores
          path: tests/Browser/screenshots
          retention-days: 3
